name: Release — Create Release PR

# Manually opens / updates the "Version Packages" (Release) PR. Run this from the
# Actions UI when you decide to cut a release. It collects all pending
# .changeset/*.md files into a PR previewing the version bumps + CHANGELOG diff.
# Nothing is published here — merging the PR into main is what triggers the
# automatic publish (see release.yml, which runs on push to main).
#
# This is intentionally manual (workflow_dispatch) so that "cut a release" is a
# deliberate action rather than a bot PR that updates on every push to main.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  version-pr:
    name: Open / update Version Packages PR
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create / update Version Packages PR
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
