name: Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package to release (semantic-release runs per package)'
        required: true
        type: choice
        options:
          - core
          - mcp
          - cli
          - vscode
          - all
        default: 'all'
      ref:
        description: 'Branch / tag to release from (defaults to production)'
        required: false
        default: 'production'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release ${{ inputs.package }} from ${{ inputs.ref }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build npm packages
        if: inputs.package == 'core' || inputs.package == 'mcp' || inputs.package == 'cli' || inputs.package == 'all'
        run: pnpm --filter '@cc-wf-studio/*' run build

      - name: Release @cc-wf-studio/core
        if: inputs.package == 'core' || inputs.package == 'all'
        working-directory: packages/core
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Release @cc-wf-studio/mcp
        if: inputs.package == 'mcp' || inputs.package == 'all'
        working-directory: packages/mcp
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Release @cc-wf-studio/cli
        if: inputs.package == 'cli' || inputs.package == 'all'
        working-directory: packages/cli
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Build VSCode extension
        if: inputs.package == 'vscode' || inputs.package == 'all'
        run: pnpm --filter cc-wf-studio run build

      - name: Release cc-wf-studio (VSCode extension)
        if: inputs.package == 'vscode' || inputs.package == 'all'
        working-directory: packages/vscode
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Detect VSIX-needed release
        if: inputs.package == 'vscode' || inputs.package == 'all'
        id: detect-vsix
        run: |
          # semantic-release pushes a new commit + tag onto production. The
          # release-bot commit ends up at HEAD locally too, so we look for any
          # tag pointing at HEAD that matches the cc-wf-studio@* prefix.
          NEW_TAG=$(git tag --points-at HEAD | grep '^cc-wf-studio@' | head -1 || true)
          if [ -n "$NEW_TAG" ]; then
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "needs_vsix=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_vsix=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package VSIX
        if: steps.detect-vsix.outputs.needs_vsix == 'true'
        run: pnpm --filter cc-wf-studio run package

      - name: Upload VSIX to GitHub Release
        if: steps.detect-vsix.outputs.needs_vsix == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          VSIX_TAG: ${{ steps.detect-vsix.outputs.tag }}
        run: |
          VSIX_FILE=$(ls packages/vscode/*.vsix)
          gh release upload "$VSIX_TAG" "$VSIX_FILE" --clobber
