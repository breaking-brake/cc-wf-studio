name: Release — Publish

# Publishes automatically when a release lands on main. A release lands when the
# "Version Packages" (Release) PR — created manually via release-version-pr.yml —
# is merged: that merge consumes the changesets, bumps versions, and pushes to
# main. This workflow then publishes the npm packages, creates the git tags, and
# (when cc-wf-studio was bumped) builds + uploads the VSIX to its GitHub Release.
#
# Ordinary feature merges to main also push here, but they still carry pending
# changesets (versions not yet bumped), so the `check` job short-circuits and the
# publish job is skipped. `pnpm changeset publish` is also idempotent — it only
# publishes versions ahead of the registry — so a no-op push is harmless.
#
# npm authentication uses OIDC Trusted Publishing — no NPM_TOKEN secret. Each of
# @cc-wf-studio/{core,mcp,cli} has a Trusted Publisher on npmjs.com pointing at
# breaking-brake/cc-wf-studio → this workflow file (release.yml). The trigger
# kind (push vs dispatch) does not affect OIDC, so this file name must stay.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / sha to publish from (defaults to main)'
        required: false
        default: main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  check:
    name: Detect release push
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Detect whether this push is a release
        id: detect
        run: |
          # A release push has NO pending changesets (the Release PR merge
          # consumed them and bumped versions). Ordinary feature merges still
          # carry .changeset/*.md, so we skip publishing for them.
          PENDING=$(ls .changeset/*.md 2>/dev/null | grep -v 'README.md' || true)
          if [ -z "$PENDING" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "No pending changesets — treating this push as a release."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Pending changesets present — not a release push. Skipping publish:"
            echo "$PENDING"
          fi

  publish:
    name: Publish
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Publish (Changesets)
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Detect VSCode extension release
        id: detect-vsix
        run: |
          # changeset publish tags the released commit (e.g. cc-wf-studio@3.35.0)
          # when the extension version was bumped. Look for that tag at HEAD.
          NEW_TAG=$(git tag --points-at HEAD | grep '^cc-wf-studio@' | head -1 || true)
          if [ -n "$NEW_TAG" ]; then
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "needs_vsix=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_vsix=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package VSIX
        if: steps.detect-vsix.outputs.needs_vsix == 'true'
        run: pnpm --filter cc-wf-studio run package

      - name: Upload VSIX to GitHub Release
        if: steps.detect-vsix.outputs.needs_vsix == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          VSIX_TAG: ${{ steps.detect-vsix.outputs.tag }}
        run: |
          VSIX_FILE=$(ls packages/vscode/*.vsix)
          gh release upload "$VSIX_TAG" "$VSIX_FILE" --clobber
